<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquitecto Pro - Sistema de Planificación</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif-doc { font-family: 'Noto Serif', serif; }
        @media print {
            .no-print { display: none !important; }
            .print-area { padding: 0 !important; background: white !important; }
            .paper-sheet { box-shadow: none !important; margin: 0 !important; border: none !important; }
        }
        .paper-sheet {
            width: 210mm;
            min-height: 297mm;
            padding: 1.5cm;
            margin: 2rem auto;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Layout, Calendar, ClipboardCheck, FileText, BookOpen, 
            Plus, Trash2, Download, Printer, Save, PenTool, 
            Database, RefreshCw, CheckCircle, Search, ChevronRight
        } = lucide;

        // ==========================================
        // CONFIGURACIÓN: PEGA TU URL AQUÍ ABAJO
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTUzeq0E3ld5haKRwmLEHAWzJXCytCA-OPFkp7O2IWIvxbfYxjNUpDH_dUImqZKiH4NQ/exec"; 

        const App = () => {
            const [activeTab, setActiveTab] = useState('doc01');
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);

            // Estado Maestro de Datos
            const [store, setStore] = useState({
                config: { institucion: "", docente: "", grado: "", seccion: "", area: "", nivel: "", anio: "2026" },
                matriz: [{ id: "m1", estandar: "", competencia: "", capacidades: "", desempeno_dcn: "", desempeno_precisado: "", criterios: "" }],
                anual: { fundamentacion: "", enfoques: [], calendarizacion: [] },
                unidad: { numero: "1", titulo: "", situacion: "", sesiones: [] }
            });

            // Función para Guardar en Google Sheets
            const saveToSheets = async (target, dataAction) => {
                if (APPS_SCRIPT_URL === "PON_AQUI_TU_URL") {
                    console.warn("URL de Apps Script no configurada");
                    return;
                }
                
                setIsSaving(true);
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Importante para Apps Script
                        cache: 'no-cache',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            target: target,
                            action: 'save',
                            data: dataAction
                        })
                    });
                    setLastSaved(new Date().toLocaleTimeString());
                } catch (error) {
                    console.error("Error al guardar:", error);
                } finally {
                    setTimeout(() => setIsSaving(false), 1000);
                }
            };

            // Vistas de los Documentos
            const Doc01Matriz = () => (
                <div className="paper-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase underline">MATRIZ DE ESTÁNDARES Y DESEMPEÑOS PRECISADOS - 2026</h1>
                    </div>
                    <table className="w-full border-collapse border border-black">
                        <thead className="bg-slate-50 font-bold text-center uppercase text-[8pt]">
                            <tr>
                                <th className="border border-black p-2 w-[20%]">ESTÁNDAR</th>
                                <th className="border border-black p-2 w-[15%]">COMPETENCIA</th>
                                <th className="border border-black p-2">CAPACIDADES</th>
                                <th className="border border-black p-2">DESEMPEÑO DCN</th>
                                <th className="border border-black p-2 bg-yellow-50">DESEMPEÑOS PRECISADOS</th>
                                <th className="border border-black p-2 bg-blue-50">CRITERIOS</th>
                            </tr>
                        </thead>
                        <tbody>
                            {store.matriz.map((row, idx) => (
                                <tr key={row.id}>
                                    <td className="border border-black p-1 align-top italic text-[8pt]">
                                        <textarea className="w-full min-h-[100px] border-none outline-none resize-none bg-transparent" placeholder="Copiar estándar aquí..." />
                                    </td>
                                    <td className="border border-black p-1 align-top font-bold">
                                        <textarea className="w-full border-none outline-none resize-none bg-transparent" placeholder="Competencia..." />
                                    </td>
                                    <td className="border border-black p-1 align-top">
                                        <textarea className="w-full border-none outline-none resize-none bg-transparent" placeholder="Capacidades..." />
                                    </td>
                                    <td className="border border-black p-1 align-top">
                                        <textarea className="w-full border-none outline-none resize-none bg-transparent" placeholder="DCN..." />
                                    </td>
                                    <td className="border border-black p-1 align-top bg-yellow-50/20">
                                        <textarea className="w-full border-none outline-none resize-none bg-transparent font-bold" placeholder="PRECISAR AQUÍ..." />
                                    </td>
                                    <td className="border border-black p-1 align-top bg-blue-50/20">
                                        <textarea className="w-full border-none outline-none resize-none bg-transparent font-bold" placeholder="CRITERIOS..." />
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    <div className="mt-4 no-print flex gap-2">
                        <button className="flex items-center gap-1 bg-slate-800 text-white px-3 py-1 rounded text-xs" onClick={() => saveToSheets('MATRIZ', store.matriz[0])}>
                            <Save size={14}/> Guardar en Sheets
                        </button>
                    </div>
                </div>
            );

            const Doc04Sesion = () => (
                <div className="paper-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase">PLANIFICACIÓN DE ACTIVIDADES SEMANALES - 2026</h1>
                    </div>
                    <div className="space-y-1 mb-6 uppercase font-bold text-[9pt]">
                        <p>NIVEL: {store.config.nivel || ".........."}</p>
                        <div className="flex justify-between">
                            <p>ÁREA/TALLER: {store.config.area || ".........."}</p>
                            <p>DOCENTE: {store.config.docente || ".........."}</p>
                        </div>
                        <div className="flex justify-between">
                            <p>GRADO: {store.config.grado || ".........."}</p>
                            <p>UNIDAD N°: {store.unidad.numero || "1"}</p>
                        </div>
                        <p>NOMBRE DE LA SESIÓN: <span className="font-normal underline">________________________________</span></p>
                        <p>PROPÓSITO DE APRENDIZAJE: <span className="font-normal italic">________________________________</span></p>
                    </div>
                    <table className="w-full border-collapse border border-black text-[8pt] text-center">
                        <thead className="bg-gray-100 font-bold uppercase">
                            <tr>
                                <th className="border border-black p-1 w-16">FECHA/H</th>
                                <th className="border border-black p-1">COMPETENCIA</th>
                                <th className="border border-black p-1">CAPACIDADES</th>
                                <th className="border border-black p-1 bg-yellow-50">DESEMPEÑO PRECISADO</th>
                                <th className="border border-black p-1">CRITERIOS</th>
                                <th className="border border-black p-1 w-1/4">SECUENCIA</th>
                                <th className="border border-black p-1">EVIDENCIAS</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr className="h-40">
                                <td className="border border-black p-1"></td>
                                <td className="border border-black p-1 font-bold italic">Viene de Matriz...</td>
                                <td className="border border-black p-1">Viene de Matriz...</td>
                                <td className="border border-black p-1 bg-yellow-50/10 italic">Auto-inyectado</td>
                                <td className="border border-black p-1">Auto-inyectado</td>
                                <td className="border border-black p-1 text-left align-top p-2">
                                    <strong>INICIO:</strong><br/>
                                    <strong>DESARROLLO:</strong><br/>
                                    <strong>CIERRE:</strong>
                                </td>
                                <td className="border border-black p-1"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <nav className="bg-slate-900 text-white px-6 py-3 flex items-center justify-between sticky top-0 z-50 no-print shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/30">
                                <PenTool size={20} />
                            </div>
                            <div>
                                <h1 className="font-black text-xl tracking-tighter uppercase leading-none">Arquitecto <span className="text-blue-500">Pro</span></h1>
                                <p className="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-widest">Sistema de Gestión Curricular 100%</p>
                            </div>
                        </div>

                        <div className="flex gap-1 bg-slate-800 p-1 rounded-xl border border-slate-700">
                            {[
                                { id: 'doc01', label: '01. Matriz', icon: Layout },
                                { id: 'doc02', label: '02. Anual', icon: Calendar },
                                { id: 'doc03', label: '03. Unidad', icon: ClipboardCheck },
                                { id: 'doc04', label: '04. Sesión', icon: FileText },
                                { id: 'doc05', label: '05. Proyecto', icon: BookOpen },
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${
                                        activeTab === tab.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-white'
                                    }`}
                                >
                                    <tab.icon size={14} /> {tab.label.split('.')[1]}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-4">
                            {isSaving && <div className="flex items-center gap-2 text-blue-400 text-[10px] font-bold animate-pulse"><RefreshCw size={12} className="animate-spin" /> Guardando...</div>}
                            {!isSaving && lastSaved && <div className="text-slate-500 text-[9px] font-bold uppercase tracking-tighter">Último cambio: {lastSaved}</div>}
                            <button onClick={() => window.print()} className="bg-slate-700 p-2 rounded-lg hover:bg-slate-600 border border-slate-600">
                                <Printer size={18} />
                            </button>
                        </div>
                    </nav>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto p-4 bg-slate-300/40">
                        {activeTab === 'doc01' && <Doc01Matriz />}
                        {activeTab === 'doc04' && <Doc04Sesion />}
                        {['doc02', 'doc03', 'doc05'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center py-40 text-slate-400">
                                <Database size={64} className="mb-4 animate-pulse" />
                                <h2 className="text-2xl font-black uppercase italic tracking-tighter">Conectando Hoja Virtual...</h2>
                                <p className="text-sm">Fase de Construcción: Vinculando {activeTab.toUpperCase()}</p>
                            </div>
                        )}
                    </main>

                    {/* Footer Status */}
                    <footer className="bg-white border-t border-slate-200 px-6 py-2 no-print flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase">
                        <div className="flex gap-4">
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Google Sheets Conectado</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> Persistencia GitHub Activa</span>
                        </div>
                        <p>Arquitecto de Ideas & Prompts Pro © 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
