<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquitecto Pro - Sistema de Planificación</title>
    <!-- Librerías de React y Estilos -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tipografía -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #e2e8f0; }
        .font-serif-doc { font-family: 'Noto Serif', serif; }
        
        /* Estilo de Hoja A4 Virtual */
        .paper-sheet {
            width: 210mm;
            min-height: 297mm;
            padding: 1.5cm;
            margin: 2rem auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            color: black;
        }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .paper-sheet { 
                margin: 0 !important; 
                box-shadow: none !important; 
                width: 100% !important;
                border: none !important;
            }
        }

        /* Estilos de tabla estilo Word */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border: 1px solid black; padding: 4px; vertical-align: top; }
        textarea { width: 100%; border: none; outline: none; resize: none; background: transparent; font-family: inherit; font-size: inherit; }
        input { border: none; outline: none; background: transparent; width: 100%; }
        .bg-doc-header { background-color: #f1f5f9; font-weight: bold; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuración de URL - REEMPLAZAR AQUÍ
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTUzeq0E3ld5haKRwmLEHAWzJXCytCA-OPFkp7O2IWIvxbfYxjNUpDH_dUImqZKiH4NQ/exec"; 

        const App = () => {
            const [activeTab, setActiveTab] = useState('doc01');
            const [isSaving, setIsSaving] = useState(false);

            // Estado Maestro de Datos
            const [store, setStore] = useState({
                config: { institucion: "I.E. NUESTRA SEÑORA DE LA PAZ", docente: "PROF. MARCO ANTONIO", grado: "3ero", seccion: "A", area: "COMUNICACIÓN", nivel: "SECUNDARIA", anio: "2026" },
                matriz: [{ id: "m1", estandar: "", comp: "", cap: "", dcn: "", prec: "", crit: "" }],
                anual: { fundamentacion: "", enfoques: [], calendarizacion: [], recursos: { mat: "", rec: "", bibD: "", bibE: "" } },
                unidad: { n: "1", titulo: "", situacion: "", propositos: [], sesiones: [] },
                proyecto: { n: "1", nombre: "", ubicacion: "", problema: "", desafio: "", producto: "" }
            });

            // Función para guardar
            const handleSave = async (target) => {
                if (APPS_SCRIPT_URL === "PON_AQUI_TU_URL") return alert("Configura la URL de Apps Script primero");
                setIsSaving(true);
                try {
                    // Aquí iría la lógica fetch (se mantiene igual que la anterior)
                    console.log("Guardando en pestaña:", target);
                } finally {
                    setTimeout(() => setIsSaving(false), 800);
                }
            };

            // --- RENDER DE DOCUMENTOS ---

            const Doc01Matriz = () => (
                <div className="paper-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase underline">MATRIZ DE ESTÁNDARES Y DESEMPEÑOS PRECISADOS - 2026</h1>
                    </div>
                    <table>
                        <thead className="bg-doc-header text-[8pt]">
                            <tr>
                                <td className="w-[20%]">ESTÁNDAR</td>
                                <td className="w-[15%]">COMPETENCIA</td>
                                <td className="w-[15%]">CAPACIDADES</td>
                                <td className="w-[15%]">DESEMPEÑO DCN</td>
                                <td className="w-[15%] bg-yellow-50">DESEMPEÑOS PRECISADOS</td>
                                <td className="w-[20%] bg-blue-50">CRITERIOS</td>
                            </tr>
                        </thead>
                        <tbody>
                            {store.matriz.map((row) => (
                                <tr key={row.id}>
                                    <td><textarea rows="6" placeholder="Estándar..." /></td>
                                    <td className="font-bold"><textarea rows="6" placeholder="Competencia..." /></td>
                                    <td><textarea rows="6" placeholder="Capacidades..." /></td>
                                    <td><textarea rows="6" placeholder="DCN..." /></td>
                                    <td className="bg-yellow-50/20"><textarea rows="6" placeholder="PRECISIÓN..." /></td>
                                    <td className="bg-blue-50/20"><textarea rows="6" placeholder="CRITERIOS..." /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            const Doc02Anual = () => (
                <div className="paper-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase underline">PLANIFICACIÓN ANUAL - 2026</h1>
                    </div>
                    <div className="space-y-4">
                        <section>
                            <h2 className="font-bold">I. DATOS INFORMATIVOS:</h2>
                            <div className="grid grid-cols-2 gap-2 text-[9pt] uppercase mt-2">
                                <p>ÁREA: <input className="border-b border-black w-40" value={store.config.area}/></p>
                                <p>DOCENTE: <input className="border-b border-black w-40" value={store.config.docente}/></p>
                            </div>
                        </section>
                        <section>
                            <h2 className="font-bold">II. FUNDAMENTACIÓN:</h2>
                            <textarea rows="5" className="border border-black p-2 mt-1" />
                        </section>
                        <section>
                            <h2 className="font-bold uppercase">V. PROPÓSITO DE APRENDIZAJE:</h2>
                            <table className="text-[7pt] text-center">
                                <thead className="bg-slate-50 font-bold">
                                    <tr>
                                        <td rowSpan="3">COMPETENCIAS</td>
                                        <td rowSpan="3" className="w-1/4">DESEMPEÑOS DCN</td>
                                        <td colSpan="9">ORGANIZACIÓN DEL TIEMPO</td>
                                    </tr>
                                    <tr><td colSpan="3">I T</td><td colSpan="3">II T</td><td colSpan="3">III T</td></tr>
                                    <tr>{[1,2,3,4,5,6,7,8,9].map(n=><td key={n}>{n}</td>)}</tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="p-4"></td><td className="p-4"></td>
                                        {[...Array(9)].map((_,i)=><td key={i} className="border border-black"></td>)}
                                    </tr>
                                </tbody>
                            </table>
                        </section>
                    </div>
                </div>
            );

            const Doc05Proyecto = () => (
                <div className="paper-sheet font-serif-doc text-[10pt]">
                    <div className="mb-4 font-bold text-sm">
                        <p>PROYECTO N°: {store.proyecto.n}</p>
                        <p>NOMBRE: <input className="border-b border-black font-normal italic w-2/3" placeholder="Nombre del proyecto..."/></p>
                    </div>
                    <h2 className="font-bold uppercase mb-2">II. SITUACIÓN SIGNIFICATIVA:</h2>
                    <table className="text-center font-bold text-[10pt]">
                        <thead className="bg-slate-100 uppercase">
                            <tr><td>UBICACIÓN</td><td>PROBLEMÁTICA</td><td>DESAFÍO</td></tr>
                        </thead>
                        <tbody>
                            <tr className="h-40">
                                <td><textarea className="text-center italic" placeholder="..." /></td>
                                <td><textarea className="text-center italic" placeholder="..." /></td>
                                <td><textarea className="text-center italic" placeholder="..." /></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header - No se imprime */}
                    <nav className="bg-slate-900 text-white p-4 sticky top-0 z-50 no-print flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg font-black text-xl">A</div>
                            <h1 className="font-bold text-lg">ARQUITECTO PRO</h1>
                        </div>
                        
                        <div className="flex gap-1 bg-slate-800 p-1 rounded-xl">
                            {['doc01', 'doc02', 'doc03', 'doc04', 'doc05'].map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${
                                        activeTab === tab ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'
                                    }`}
                                >
                                    {tab.replace('doc', 'Doc ')}
                                </button>
                            ))}
                        </div>

                        <div className="flex gap-4">
                            <button 
                                onClick={() => handleSave(activeTab.toUpperCase())}
                                className="bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-600 flex items-center gap-2"
                            >
                                {isSaving ? "Guardando..." : "Guardar en Sheets"}
                            </button>
                            <button onClick={() => window.print()} className="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-500">
                                Imprimir
                            </button>
                        </div>
                    </nav>

                    {/* Área de Trabajo */}
                    <main className="flex-1 overflow-y-auto print-area">
                        {activeTab === 'doc01' && <Doc01Matriz />}
                        {activeTab === 'doc02' && <Doc02Anual />}
                        {activeTab === 'doc05' && <Doc05Proyecto />}
                        {(activeTab === 'doc03' || activeTab === 'doc04') && (
                            <div className="text-center py-40 text-slate-400 font-bold uppercase">
                                Hoja {activeTab.toUpperCase()} en construcción visual...
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
