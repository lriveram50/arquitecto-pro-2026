<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquitecto Pro - Sistema de Planificación</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Tailwind CSS & Babel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Noto Serif"', 'serif'],
                    },
                    colors: {
                        precisado: '#FFF9C4', /* Amarillo tenue Alta Fidelidad */
                        criterio: '#E3F2FD', /* Azul tenue Alta Fidelidad */
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .font-serif-doc { font-family: 'Noto Serif', serif; }
        
        /* Ocultar scrollbars manteniendo funcionalidad */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Hoja A4 Alta Fidelidad */
        .a4-sheet {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            margin: 2rem auto;
            padding: 20mm 20mm; /* Márgenes estándar de Word */
            box-sizing: border-box;
            position: relative;
            color: black;
        }

        /* Tablas estilo Word Alta Fidelidad */
        .word-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; margin-top: 5px; }
        .word-table th, .word-table td { border: 1.5px solid #000; padding: 4px 8px; vertical-align: top; }
        
        /* Inputs limpios */
        textarea.auto-expand { width: 100%; border: none; outline: none; resize: none; background: transparent; font-family: inherit; font-size: inherit; line-height: 1.5; padding: 0; margin: 0; overflow: hidden; }
        input.clean-input { border: none; outline: none; background: transparent; width: 100%; font-family: inherit;}

        /* Impresión perfecta */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; }
            .no-print { display: none !important; }
            .a4-sheet { 
                margin: 0 !important; 
                box-shadow: none !important; 
                width: 210mm !important; 
                min-height: 297mm !important; 
                padding: 20mm 20mm !important; 
                page-break-after: always;
            }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ICONOS SVG
        // ==========================================
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

        // ==========================================
        // COMPONENTE: AutoTextArea (Clave para Alta Fidelidad)
        // ==========================================
        const AutoTextArea = ({ value, onChange, placeholder, className, fontWeight = 'normal', textAlign = 'left' }) => {
            const textareaRef = useRef(null);

            const resize = () => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = 'auto';
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
                }
            };

            useEffect(() => { resize(); }, [value]);

            return (
                <textarea
                    ref={textareaRef}
                    value={value || ''}
                    onChange={(e) => {
                        onChange(e.target.value);
                        resize();
                    }}
                    placeholder={placeholder}
                    className={`auto-expand ${className || ''}`}
                    style={{ fontWeight, textAlign }}
                    rows={1}
                />
            );
        };

        // ==========================================
        // CONFIGURACIÓN: URL DE APPS SCRIPT
        // ==========================================
        const APPS_SCRIPT_URL = "PON_AQUI_TU_URL"; 

        const App = () => {
            const [activeTab, setActiveTab] = useState('doc01');
            const [isSaving, setIsSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);

            // --- ESTADO MAESTRO DE DATOS (EL CEREBRO) ---
            const [store, setStore] = useState({
                global: { institucion: "I.E. NUESTRA SEÑORA DE LA PAZ", docente: "PROF. MARCO ANTONIO", grado: "3ero", seccion: "A", area: "COMUNICACIÓN", nivel: "SECUNDARIA", anio: "2026", fecha: "MARZO 2026" },
                matriz: [{ id: Date.now(), estandar: "", comp: "", cap: "", dcn: "", prec: "", crit: "" }],
                anual: { 
                    fundamentacion: "", 
                    enfoques: [{ id: 1, nom: "Enfoque de Derechos", val: "", act: "" }],
                    calendarizacion: [{ id: 1, trim: "I TRIMESTRE", u: "1", nom: "", sem: "", hor: "" }],
                    propositos: [{ id: 1, compCap: "", dcn: "", uni: "", inst: "", time: Array(9).fill("") }],
                    recursos: { mat: "", rec: "", bibD: "", bibE: "" }
                },
                unidad: { n: "1", titulo: "", fecha: "", situacion: "", enfoques: [], propositos: [], sesiones: [], rec: "", mat: "" },
                proyecto: { n: "1", nombre: "", situacion: { ubi: "", prob: "", des: "" }, producto: "" }
            });

            // --- MANEJADORES DE DATOS ---
            const handleSave = async (target, dataToSave) => {
                if (APPS_SCRIPT_URL === "PON_AQUI_TU_URL") return alert("Por favor configura la URL de Apps Script en el código.");
                setIsSaving(true);
                try {
                    await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target: target, action: 'save', data: dataToSave })
                    });
                    setLastSaved(new Date().toLocaleTimeString());
                } catch (e) { console.error(e); }
                finally { setTimeout(() => setIsSaving(false), 1000); }
            };

            const updateGlobal = (field, value) => {
                setStore(prev => ({ ...prev, global: { ...prev.global, [field]: value } }));
            };

            const addRow = (path, newItem) => {
                const parts = path.split('.');
                setStore(prev => {
                    let current = { ...prev };
                    if (parts.length === 1) current[parts[0]] = [...current[parts[0]], { ...newItem, id: Date.now() }];
                    else current[parts[0]][parts[1]] = [...current[parts[0]][parts[1]], { ...newItem, id: Date.now() }];
                    return current;
                });
            };

            // NUEVO: Función para eliminar filas de forma segura
            const removeRow = (path, idToRemove) => {
                const parts = path.split('.');
                setStore(prev => {
                    let current = { ...prev };
                    if (parts.length === 1) {
                        if (current[parts[0]].length <= 1) return current; // Evitar dejar tabla vacía
                        current[parts[0]] = current[parts[0]].filter(item => item.id !== idToRemove);
                    } else {
                        if (current[parts[0]][parts[1]].length <= 1) return current;
                        current[parts[0]][parts[1]] = current[parts[0]][parts[1]].filter(item => item.id !== idToRemove);
                    }
                    return current;
                });
            };

            const updateRowField = (path, id, field, value) => {
                const parts = path.split('.');
                setStore(prev => {
                    let current = { ...prev };
                    if (parts.length === 1) {
                        current[parts[0]] = current[parts[0]].map(item => item.id === id ? { ...item, [field]: value } : item);
                    }
                    return current;
                });
            };

            // Actualiza el Estandar y Competencia (guardados en la primera fila para compatibilidad con tu BD)
            const updateEstandarComp = (field, value) => {
                setStore(prev => {
                    const newMatriz = [...prev.matriz];
                    if (newMatriz.length > 0) newMatriz[0][field] = value;
                    return { ...prev, matriz: newMatriz };
                });
            };

            // ==========================================
            // BLOQUE 01: VISTA MATRIZ (ALTA FIDELIDAD)
            // ==========================================
            const Doc01 = () => (
                <div className="a4-sheet font-serif-doc text-[11pt]">
                    {/* Encabezado */}
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-[14pt] uppercase underline">
                            MATRIZ DE ESTÁNDARES Y DESEMPEÑOS PRECISADOS - {store.global.anio}
                        </h1>
                    </div>

                    {/* Datos Informativos */}
                    <table className="word-table mb-6 text-[10.5pt]">
                        <tbody>
                            <tr>
                                <td className="w-1/4 font-bold bg-gray-100">INSTITUCIÓN EDUCATIVA</td>
                                <td className="w-1/4"><AutoTextArea value={store.global.institucion} onChange={(v) => updateGlobal('institucion', v)} /></td>
                                <td className="w-1/4 font-bold bg-gray-100">DOCENTE</td>
                                <td className="w-1/4"><AutoTextArea value={store.global.docente} onChange={(v) => updateGlobal('docente', v)} /></td>
                            </tr>
                            <tr>
                                <td className="font-bold bg-gray-100">ÁREA</td>
                                <td><AutoTextArea value={store.global.area} onChange={(v) => updateGlobal('area', v)} /></td>
                                <td className="font-bold bg-gray-100">NIVEL</td>
                                <td><AutoTextArea value={store.global.nivel} onChange={(v) => updateGlobal('nivel', v)} /></td>
                            </tr>
                            <tr>
                                <td className="font-bold bg-gray-100">GRADO Y SECCIÓN</td>
                                <td><AutoTextArea value={`${store.global.grado} "${store.global.seccion}"`} onChange={(v) => {
                                    // Separar grado y sección de forma simple si el usuario edita
                                    const parts = v.split('"');
                                    if(parts.length > 1) {
                                        updateGlobal('grado', parts[0].trim());
                                        updateGlobal('seccion', parts[1].trim());
                                    } else {
                                        updateGlobal('grado', v);
                                    }
                                }} /></td>
                                <td className="font-bold bg-gray-100">FECHA</td>
                                <td><AutoTextArea value={store.global.fecha} onChange={(v) => updateGlobal('fecha', v)} /></td>
                            </tr>
                        </tbody>
                    </table>

                    {/* Estándar y Competencia (Se guardan en el index 0 para no romper tu lógica) */}
                    <table className="word-table mb-6">
                        <tbody>
                            <tr>
                                <td className="font-bold bg-gray-100 w-[20%] text-center align-middle">ESTÁNDAR DE APRENDIZAJE</td>
                                <td className="w-[80%]">
                                    <AutoTextArea 
                                        value={store.matriz[0]?.estandar || ''} 
                                        onChange={(v) => updateEstandarComp('estandar', v)} 
                                        placeholder="Redacte o pegue el estándar..."
                                    />
                                </td>
                            </tr>
                            <tr>
                                <td className="font-bold bg-gray-100 text-center align-middle">COMPETENCIA</td>
                                <td>
                                    <AutoTextArea 
                                        value={store.matriz[0]?.comp || ''} 
                                        onChange={(v) => updateEstandarComp('comp', v)} 
                                        placeholder="Ingrese la competencia..."
                                    />
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    {/* Tabla Principal de 4 Columnas */}
                    <table className="word-table">
                        <thead>
                            <tr className="bg-gray-100 text-center font-bold">
                                <th className="w-[20%]">CAPACIDADES</th>
                                <th className="w-[25%]">DESEMPEÑO DCN</th>
                                <th className="w-[30%] bg-precisado text-black">DESEMPEÑOS PRECISADOS</th>
                                <th className="w-[25%] bg-criterio text-black">CRITERIOS DE EVALUACIÓN</th>
                            </tr>
                        </thead>
                        <tbody>
                            {store.matriz.map((row) => (
                                <tr key={row.id}>
                                    <td>
                                        <AutoTextArea 
                                            value={row.cap} 
                                            onChange={(v) => updateRowField('matriz', row.id, 'cap', v)} 
                                            placeholder="Capacidad..."
                                        />
                                    </td>
                                    <td>
                                        <AutoTextArea 
                                            value={row.dcn} 
                                            onChange={(v) => updateRowField('matriz', row.id, 'dcn', v)} 
                                            placeholder="Desempeño original..."
                                        />
                                    </td>
                                    <td className="bg-precisado/40">
                                        <AutoTextArea 
                                            value={row.prec} 
                                            onChange={(v) => updateRowField('matriz', row.id, 'prec', v)} 
                                            placeholder="Desempeño precisado..."
                                        />
                                    </td>
                                    <td className="bg-criterio/40 relative group">
                                        <AutoTextArea 
                                            value={row.crit} 
                                            onChange={(v) => updateRowField('matriz', row.id, 'crit', v)} 
                                            placeholder="Criterio..."
                                        />
                                        
                                        {/* Botón Eliminar Fila (Solo aparece en hover y no se imprime) */}
                                        {store.matriz.length > 1 && (
                                            <button
                                                onClick={() => removeRow('matriz', row.id)}
                                                title="Eliminar esta fila"
                                                className="no-print absolute top-1 right-1 p-1.5 bg-red-100 text-red-600 rounded opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-200 shadow-sm"
                                            >
                                                <IconTrash />
                                            </button>
                                        )}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    
                    {/* Botón Añadir Fila (No se imprime) */}
                    <div className="no-print mt-2 flex justify-end">
                        <button 
                            onClick={() => addRow('matriz', { estandar: store.matriz[0]?.estandar, comp: store.matriz[0]?.comp, cap: "", dcn: "", prec: "", crit: "" })}
                            className="flex items-center gap-1 text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-1.5 px-3 rounded transition-colors"
                        >
                            <IconPlus /> Añadir Fila
                        </button>
                    </div>
                </div>
            );

            // ==========================================
            // BLOQUE 02: VISTA ANUAL (DOC 02)
            // ==========================================
            const Doc02 = () => (
                <div className="a4-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-10"><h1 className="font-bold text-xl uppercase underline">PLANIFICACIÓN ANUAL - {store.global.anio}</h1></div>
                    <section className="mb-6 uppercase font-bold text-[9.5pt]">
                        <h2 className="mb-2">I. DATOS INFORMATIVOS:</h2>
                        <div className="grid grid-cols-2 gap-y-1">
                            <p>ÁREA Y/O PROYECTO: <span className="font-normal border-b border-black inline-block min-w-[150px]">{store.global.area}</span></p>
                            <p>ENFOQUE DE ÁREA: <span className="font-normal border-b border-black inline-block min-w-[150px]">COMUNICATIVO</span></p>
                            <p>DOCENTE: <span className="font-normal border-b border-black inline-block min-w-[200px]">{store.global.docente}</span></p>
                            <p>GRADO Y SEC.: <span className="font-normal border-b border-black inline-block min-w-[100px]">{store.global.grado} {store.global.seccion}</span></p>
                            <p>FECHA: <span className="font-normal border-b border-black inline-block min-w-[100px]">{store.global.fecha}</span></p>
                        </div>
                    </section>
                    <section className="mb-6"><h2 className="font-bold uppercase">II. FUNDAMENTACIÓN</h2><textarea rows="5" className="border border-black p-2 mt-1 auto-expand" placeholder="Escribir fundamento anual..." /></section>
                    <section className="mb-6">
                        <h2 className="font-bold uppercase">III. ENFOQUES TRANSVERSALES</h2>
                        <table className="word-table text-[9pt] mt-1 text-center">
                            <thead className="bg-gray-100 font-bold uppercase">
                                <tr><th>ENFOQUES TRANSVERSALES</th><th>VALORES</th><th>ACTITUDES</th></tr>
                            </thead>
                            <tbody>
                                {store.anual.enfoques.map(enf => (
                                    <tr key={enf.id}>
                                        <td className="p-1"><input className="clean-input font-bold text-center" value={enf.nom} readOnly/></td>
                                        <td className="p-1"><input className="clean-input text-center" placeholder="Valor..." /></td>
                                        <td className="p-1"><AutoTextArea placeholder="Actitudes..." /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </section>
                </div>
            );

            // ==========================================
            // BLOQUE 03: VISTA UNIDAD (DOC 03)
            // ==========================================
            const Doc03 = () => (
                <div className="a4-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase">UNIDAD N°: {store.unidad.n}</h1>
                        <p className="font-bold flex justify-center items-center gap-2">TÍTULO DE LA UNIDAD: <input className="border-b border-black w-2/3 text-center clean-input" placeholder="..."/></p>
                    </div>
                    <section className="mb-6 uppercase font-bold text-[9.5pt]">
                        <h2 className="mb-2">I. DATOS INFORMATIVOS:</h2>
                        <div className="grid grid-cols-2 gap-y-1">
                            <p>ÁREA: <span className="font-normal">{store.global.area}</span></p>
                            <p>NIVEL: <span className="font-normal">{store.global.nivel}</span></p>
                            <p>GRADO: <span className="font-normal">{store.global.grado}</span></p>
                            <p>DOCENTE: <span className="font-normal">{store.global.docente}</span></p>
                        </div>
                    </section>
                    <section className="mb-6">
                        <h2 className="font-bold uppercase">II. SITUACIÓN SIGNIFICATIVA:</h2>
                        <AutoTextArea className="border border-black p-4 mt-1 italic text-[9.5pt]" placeholder="Redactar la situación significativa de la unidad..." />
                    </section>
                    <table className="word-table text-[8pt] text-center mt-6">
                        <thead className="bg-gray-100 font-bold uppercase">
                            <tr><th>N° SESIÓN</th><th>NOMBRE DE LA SESIÓN</th><th>COMPETENCIA Y CAPACIDADES</th><th>DESEMPEÑO PRECISADO</th></tr>
                        </thead>
                        <tbody>
                            {[1,2,3].map(n => (
                                <tr key={n}><td className="w-[10%]">{n}</td><td className="w-[30%]"><AutoTextArea/></td><td className="w-[30%]"><AutoTextArea/></td><td className="w-[30%]"><AutoTextArea/></td></tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            // ==========================================
            // BLOQUE 04: VISTA SESIÓN (DOC 04)
            // ==========================================
            const Doc04 = () => (
                <div className="a4-sheet font-serif-doc text-[10pt]">
                    <div className="text-center mb-6">
                        <h1 className="font-bold text-lg uppercase">PLANIFICACIÓN DE ACTIVIDADES SEMANALES - {store.global.anio}</h1>
                    </div>
                    <div className="grid grid-cols-2 gap-4 uppercase font-bold text-[9pt] mb-6">
                        <p>ÁREA: <span className="font-normal">{store.global.area}</span></p>
                        <p>DOCENTE: <span className="font-normal">{store.global.docente}</span></p>
                        <p>GRADO: <span className="font-normal">{store.global.grado} "{store.global.seccion}"</span></p>
                        <p className="flex gap-2 items-center">SESIÓN N°: <input className="border-b border-black w-12 clean-input" /></p>
                    </div>
                    <div className="border-t border-black pt-4 space-y-2">
                        <p className="font-bold flex gap-2">NOMBRE DE LA SESIÓN: <input className="border-b border-black flex-1 clean-input" /></p>
                        <p className="font-bold flex gap-2">PROPÓSITO: <input className="border-b border-black flex-1 italic clean-input" /></p>
                    </div>
                    <table className="word-table mt-6 text-[8.5pt]">
                        <thead className="bg-gray-100 font-bold text-center">
                            <tr><th>SECUENCIA DIDÁCTICA</th><th>TIEMPO</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td className="p-4 min-h-[400px]">
                                    <p className="font-bold underline mb-1">INICIO:</p>
                                    <AutoTextArea className="mb-4" placeholder="Actividades de inicio..." />
                                    
                                    <p className="font-bold underline mb-1">DESARROLLO:</p>
                                    <AutoTextArea className="mb-4" placeholder="Actividades de desarrollo..." />
                                    
                                    <p className="font-bold underline mb-1">CIERRE:</p>
                                    <AutoTextArea placeholder="Actividades de cierre..." />
                                </td>
                                <td className="w-20"><AutoTextArea className="text-center" placeholder="Minutos" /></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );

            // ==========================================
            // BLOQUE 05: VISTA PROYECTO (DOC 05)
            // ==========================================
            const Doc05 = () => (
                <div className="a4-sheet font-serif-doc text-[10pt]">
                    <div className="mb-10 font-bold uppercase text-sm space-y-2">
                        <p className="flex gap-2">PROYECTO N°: <input className="w-12 border-b border-black font-normal clean-input" /></p>
                        <p className="flex gap-2">NOMBRE DEL PROYECTO: <input className="flex-1 border-b border-black font-normal italic clean-input" placeholder="Título del proyecto..." /></p>
                    </div>
                    <section className="mb-6 uppercase font-bold text-[9pt] border-l-4 border-black pl-4">
                        <h2 className="mb-3">I. DATOS INFORMATIVOS</h2>
                        <div className="grid grid-cols-2 gap-y-1">
                            <p>NIVEL: <span className="font-normal">{store.global.nivel}</span></p>
                            <p>GRADO: <span className="font-normal">{store.global.grado} "{store.global.seccion}"</span></p>
                            <p>DOCENTE: <span className="font-normal">{store.global.docente}</span></p>
                        </div>
                    </section>
                    <section className="mb-8">
                        <h2 className="font-bold uppercase mb-2">II. SITUACIÓN SIGNIFICATIVA:</h2>
                        <table className="word-table text-center font-bold text-[10.5pt] bg-slate-50">
                            <thead><tr><th className="w-1/3">UBICACIÓN</th><th className="w-1/3">PROBLEMÁTICA</th><th className="w-1/3">DESAFÍO</th></tr></thead>
                            <tbody>
                                <tr>
                                    <td className="bg-white"><AutoTextArea className="text-center italic" placeholder="..." /></td>
                                    <td className="bg-white"><AutoTextArea className="text-center italic" placeholder="..." /></td>
                                    <td className="bg-white"><AutoTextArea className="text-center italic" placeholder="..." /></td>
                                </tr>
                            </tbody>
                        </table>
                    </section>
                </div>
            );

            // ==========================================
            // BARRA LATERAL (CONTROL)
            // ==========================================
            const Sidebar = () => (
                <aside className="w-72 bg-slate-900 text-slate-400 p-6 no-print hidden lg:flex flex-col border-r border-slate-800 shrink-0">
                    <div className="flex items-center gap-3 text-white mb-10">
                        <div className="bg-blue-600 p-2.5 rounded-2xl shadow-xl shadow-blue-500/20"><span className="font-bold">A</span></div>
                        <span className="font-black text-xl tracking-tighter">ARQUITECTO PRO</span>
                    </div>
                    <nav className="flex-1 space-y-1">
                        {[
                            { id: 'doc01', label: '01. Matriz', icon: 'M' },
                            { id: 'doc02', label: '02. Anual', icon: 'A' },
                            { id: 'doc03', label: '03. Unidad', icon: 'U' },
                            { id: 'doc04', label: '04. Sesión', icon: 'S' },
                            { id: 'doc05', label: '05. Proyecto', icon: 'P' },
                        ].map(t => (
                            <button
                                key={t.id}
                                onClick={() => setActiveTab(t.id)}
                                className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-xs font-bold transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}
                            >
                                <span className="bg-slate-800 w-6 h-6 flex items-center justify-center rounded-lg text-[10px]">{t.icon}</span>
                                {t.label}
                            </button>
                        ))}
                    </nav>
                    <div className="pt-6 border-t border-slate-800">
                        <button 
                            onClick={() => handleSave(activeTab.toUpperCase(), store[activeTab.replace('doc', '')] || store.matriz )}
                            className="w-full bg-slate-800 text-white py-4 rounded-2xl text-[10px] font-black flex items-center justify-center gap-2 hover:bg-black transition-all border border-slate-700"
                        >
                            {isSaving ? "GUARDANDO..." : "GUARDAR EN SHEETS"}
                        </button>
                    </div>
                </aside>
            );

            return (
                <div className="h-screen flex overflow-hidden">
                    <Sidebar />
                    <main className="flex-1 overflow-y-auto print-area flex flex-col items-center bg-gray-100 relative">
                        {/* Cabecera Flotante */}
                        <header className="w-full bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center no-print sticky top-0 z-10 shadow-sm">
                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Planificación Integral / {activeTab}</div>
                            <div className="flex items-center gap-4">
                                {lastSaved && <span className="text-[10px] font-bold text-green-600 bg-green-50 px-3 py-1.5 rounded-full border border-green-200">SINCRONIZADO {lastSaved}</span>}
                                <button onClick={() => window.print()} className="px-4 py-2 text-sm font-bold text-white bg-slate-800 hover:bg-slate-700 rounded-lg shadow-md transition-all flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                                    Imprimir
                                </button>
                            </div>
                        </header>
                        
                        {/* Contenedor del Documento con Scroll Propio para evitar que la barra lateral se achique al imprimir */}
                        <div className="w-full flex-1 overflow-y-auto pb-10 no-scrollbar flex flex-col items-center justify-start">
                            {activeTab === 'doc01' && <Doc01 />}
                            {activeTab === 'doc02' && <Doc02 />}
                            {activeTab === 'doc03' && <Doc03 />}
                            {activeTab === 'doc04' && <Doc04 />}
                            {activeTab === 'doc05' && <Doc05 />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
